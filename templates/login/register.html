<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Registro - Portal do Aluno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
    <div class="login-card">
        <div class="brand-icon">
            <!-- Graduation Cap Icon -->
            <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="bi bi-mortarboard-fill" viewBox="0 0 16 16">
              <path d="M8.211 2.047a.5.5 0 0 0-.422 0l-7.5 3.5a.5.5 0 0 0 .025.917l7.5 3a.5.5 0 0 0 .372 0L14 7.14V13a1 1 0 0 0-1 1v2h3v-2a1 1 0 0 0-1-1V6.739l.686-.275a.5.5 0 0 0 .025-.917l-7.5-3.5Z"/>
              <path d="M4.176 9.032a.5.5 0 0 0-.656.327l-.5 1.7a.5.5 0 0 0 .294.605l4.5 1.8a.5.5 0 0 0 .372 0l4.5-1.8a.5.5 0 0 0 .294-.605l-.5-1.7a.5.5 0 0 0-.656-.327L8 10.466 4.176 9.032Z"/>
            </svg>
        </div>
        <h2 class="login-title">Criar Conta</h2>
        <p class="login-subtitle">Junte-se a nós e transforme seus estudos.</p>

        <form method="POST" action="{{ url_for('register') }}">
            {% if error %}
            <div class="alert alert-danger" role="alert" style="border-radius: 12px; font-size: 0.9rem;">
                {{ error }}
            </div>
            {% endif %}
            <div class="mb-3">
                <input type="text" class="form-control custom-input" id="name" name="name" placeholder="Nome Completo" required>
            </div>
            <div class="mb-3">
                <input type="email" class="form-control custom-input" id="email" name="email" placeholder="Endereço de e-mail" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control custom-input" id="password" name="password" placeholder="Senha" required>
            </div>
            <div class="mb-4">
                <input type="password" class="form-control custom-input" id="confirmPassword" name="confirmPassword" placeholder="Confirmar Senha" required>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-primary-custom btn-custom">Criar Conta</button>
            </div>
            
            <div class="text-center mt-4">
                <p class="text-muted" style="font-size: 0.95rem;">Já tem uma conta? <a href="{{ url_for('login') }}" class="forgot-link">Faça login aqui</a></p>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
